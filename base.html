<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>PlantSwap</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-4 px-3">
        <a class="navbar-brand" href="/">🌿 PlantSwap</a>
        <div class="ms-auto">
            {% if session.username %}
                <a href="/my_plants" class="btn btn-outline-light btn-sm me-2">Мои цветы</a>
                <a href="/add" class="btn btn-outline-light btn-sm me-2">Отдать цветок</a>
                <a href="/logout" class="btn btn-light btn-sm">Выйти</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm me-2">Войти</a>
                <a href="/register" class="btn btn-light btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
