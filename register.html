{% extends 'base.html' %}
{% block content %}
<div class="col-md-4 mx-auto card p-4 shadow-sm">
    <h3 class="text-center">Регистрация</h3>
    <form method="POST">
        <input type="text" name="username" class="form-control mb-2" placeholder="Придумайте логин" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Придумайте пароль" required>
        <button class="btn btn-success w-100">Создать аккаунт</button>
    </form>
    <p class="mt-2 small text-center">Уже зарегистрированы? <a href="/login">Войти</a></p>
</div>
{% endblock %}
