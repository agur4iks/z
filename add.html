{% extends 'base.html' %}
{% block content %}
<div class="col-md-6 mx-auto card p-4 shadow-sm">
    <h3 class="mb-3">Отдать растение</h3>
    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="title" class="form-control mb-2" placeholder="Название цветка" required>
        <textarea name="description" class="form-control mb-2" placeholder="Описание"></textarea>
        <input type="file" name="file" class="form-control mb-3" required>
        <button class="btn btn-success w-100">Опубликовать</button>
    </form>
</div>
{% endblock %}
