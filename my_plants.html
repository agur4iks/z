{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">Кабинет: {{ session.username }}</h3>
<h4 class="text-success">Я забрал:</h4>
<div class="row mb-4">
    {% for p in taken %}
    <div class="col-md-3 mb-2">
        <div class="card p-2 border-success shadow-sm text-center">
            <img src="/static/uploads/{{p.image_name}}" class="card-img-top mb-2" style="height:100px; object-fit:cover;">
            <h6>{{p.title}}</h6>
        </div>
    </div>
    {% else %}<p class="text-muted">Пусто</p>{% endfor %}
</div>
<h4 class="text-primary">Я выставил:</h4>
<div class="row">
    {% for p in posted %}
    <div class="col-md-3 mb-2">
        <div class="card p-2 shadow-sm text-center">
            <h6>{{p.title}}</h6>
            {% if p.taker_id %}<span class="badge bg-secondary">Забрали</span>
            {% else %}<span class="badge bg-primary">Ищет дом</span>{% endif %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
