{% extends 'base.html' %}
{% block content %}
<div class="col-md-4 mx-auto card p-4 shadow-sm">
    <h3 class="text-center">Вход</h3>
    <form method="POST">
        <input type="text" name="username" class="form-control mb-2" placeholder="Логин" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
        <button class="btn btn-success w-100">Войти</button>
    </form>
    <p class="mt-2 small text-center">Нет аккаунта? <a href="/register">Регистрация</a></p>
</div>
{% endblock %}
